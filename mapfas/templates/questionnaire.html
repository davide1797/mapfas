<!DOCTYPE html>
<html>
<head>
    <title>SUS Questionnaire</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="sidebar">
        <ul>
            <li><a href="#" onclick="home()">🧪 PFAS</a></li>
            <li><a href="#" onclick="map()">🗺️ Map</a></li>
            <li><a href="#" onclick="test()">🧠 Test</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h1 class="title">📝 Usability Questionnaire</h1>

        {% if question %}
        <form method="post" action="/questionnaire" class="quiz-card">
            <p class="question">{{ question.question }}</p>

            <label class="option">
                <input type="radio" name="answer" value="0" required>
                <span>Strongly disagree</span>
            </label>

            <label class="option">
                <input type="radio" name="answer" value="1">
                <span>Disagree</span>
            </label>

            <label class="option">
                <input type="radio" name="answer" value="2">
                <span>Not sure</span>
            </label>

            <label class="option">
                <input type="radio" name="answer" value="3">
                <span>Agree</span>
            </label>

            <label class="option">
                <input type="radio" name="answer" value="4">
                <span>Strongly agree</span>
            </label>

            <button type="submit" class="submit-btn">Submit Answer</button>
        </form>
        {% endif %}

        {% if finished %}
            <div class="final-score">
                <h2>🎉 Thank you for filling the questionnaire</h2>
                <p>Your usability score:</p>
                <p class="score">{{ score }} / {{ 100.0 }}</p>
            </div>
        {% endif %}
    </div>

    <script>
    function home() {
        window.location.href = "/";
    }

    function map() {
        window.location.href = "/map_view";
    }

    function test() {
        window.location.href = "/test";
    }
    </script>

</body>
</html>
